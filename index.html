<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI肖像画 歴史クイズ（シャッフル機能付）</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1e1e1e;
            --paper: #fdf5e6;
        }

        body {
            background-color: var(--dark);
            color: #333;
            font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-card {
            background: var(--paper);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border: 3px double var(--gold);
            text-align: center;
        }

        .portrait-frame {
            width: 220px;
            height: 220px;
            margin: 0 auto 20px;
            border: 6px solid #333;
            background: #ccc;
            overflow: hidden;
            border-radius: 50%;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease-out;
        }

        .speech-bubble {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            font-size: 1.1rem;
            min-height: 50px;
        }

        .choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button.choice-btn {
            padding: 12px;
            border: 1px solid #aaa;
            background: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button.choice-btn:hover {
            background: var(--gold);
            color: white;
            border-color: var(--gold);
        }

        #next-btn {
            margin-top: 20px;
            background: #333;
            color: white;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: none;
        }

        .fade { animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="game-card">
    <div class="portrait-frame">
        <img id="char-img" src="" alt="肖像画">
    </div>
    
    <div class="speech-bubble" id="dialogue">読み込み中...</div>

    <div class="choices" id="choices-container"></div>

    <button id="next-btn" onclick="nextStage()">次の人物へ</button>
</div>

<script>
    // --- データ設定 （history_game） ---
    const quizData = [
        {
            name: "織田信長",
            img: "nobunaga.jpg", 
            msg: "我は織田信長。私が「楽市楽座」を最初に行った城下町はどこか知っておるか？",
            options: ["小牧山城", "岐阜城", "清洲城", "安土城"],
            answer: "岐阜城", // ★インデックスではなく「文字列」で判定するように改良
            correct: "その通り！天下布武の始まりはこの地からよ。",
            wrong: "笑わせるな。そんな基礎も知らぬとは。"
        },
        {
            name: "クレオパトラ",
            img: "cleopatra.jpg", 
            msg: "エジプトの太陽、クレオパトラよ。私の死後、エジプトを支配した帝国はどこ？",
            options: ["ローマ帝国", "ペルシア帝国", "オスマン帝国", "モンゴル帝国"],
            answer: "ローマ帝国",
            correct: "正解よ。歴史の流れをよく理解しているわね。",
            wrong: "残念。私の最後を汚さないで頂戴。"
        }
    ];

    let currentIdx = 0;

    // シャッフル関数 (Fisher-Yates)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function loadStage() {
        const data = quizData[currentIdx];
        const img = document.getElementById('char-img');
        const dialogue = document.getElementById('dialogue');
        const container = document.getElementById('choices-container');
        
        // リセット
        img.src = data.img;
        img.style.transform = 'scale(1.0)';
        dialogue.innerText = data.msg;
        document.getElementById('next-btn').style.display = 'none';
        container.innerHTML = '';

        // 選択肢をコピーしてシャッフル
        const shuffledOptions = shuffleArray([...data.options]);

        shuffledOptions.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(opt, data.answer);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct) {
        const dialogue = document.getElementById('dialogue');
        const stageData = quizData[currentIdx];

        if (selected === correct) {
            dialogue.innerHTML = `<strong>【正解】</strong><br>${stageData.correct}`;
            document.getElementById('next-btn').style.display = 'block';
            document.querySelector('.portrait-frame img').style.transform = 'scale(1.1)';
        } else {
            dialogue.innerText = stageData.wrong;
            document.querySelector('.portrait-frame img').style.transform = 'scale(0.9)';
        }
    }

    function nextStage() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            loadStage();
        } else {
            document.getElementById('dialogue').innerText = "見事！すべての歴史の試練を乗り越えました！";
            document.getElementById('choices-container').innerHTML = '';
            document.getElementById('next-btn').innerText = "最初からやり直す";
            document.getElementById('next-btn').onclick = () => location.reload();
        }
    }

    window.onload = loadStage;
</script>

</body>
</html>
