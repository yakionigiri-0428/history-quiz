<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI歴史肖像画クイズ 表情変化版</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1e1e1e;
            --paper: #fdf5e6;
            --correct: #4caf50;
            --wrong: #f44336;
        }

        body {
            background-color: var(--dark);
            color: #333;
            font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .screen {
            display: none;
            background: var(--paper);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border: 3px double var(--gold);
            text-align: center;
            animation: fadeIn 0.3s;
        }

        .active { display: block; }

        h1, h2 { color: #333; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }

        .menu-btn {
            background: #333;
            color: white;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .menu-btn:hover { background: var(--gold); }

        /* タイマーバー */
        #timer-container {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        #timer-bar-fill {
            height: 100%;
            width: 100%;
            background: var(--gold);
            transition: width 1s linear;
        }

        /* 肖像画フレームとエフェクト */
        .portrait-frame {
            width: 160px;
            height: 160px;
            margin: 0 auto 15px;
            border: 6px solid #333;
            background: #ccc;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        
        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.2s ease; /* 画像切り替え時のフェード */
        }

        /* 正解時のフレーム（緑に光る） */
        .frame-correct {
            border-color: var(--correct);
            box-shadow: 0 0 20px var(--correct);
            transform: scale(1.1);
        }

        /* 不正解時のフレーム（赤く光る） */
        .frame-wrong {
            border-color: var(--wrong);
            box-shadow: 0 0 20px var(--wrong);
            transform: scale(0.95);
        }

        .speech-bubble {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 15px;
            min-height: 80px;
            text-align: left;
            position: relative;
        }

        .info-box {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #aaa;
            font-size: 0.9rem;
            color: #555;
        }

        #user-answer {
            width: 80%;
            padding: 12px;
            font-size: 1.1rem;
            margin-bottom: 10px;
            text-align: center;
            border: 2px solid #ccc;
        }

        #next-btn { background: var(--gold); display: none; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* 怒りの振動アニメーション */
        .angry-shake { animation: angryShake 0.5s; }
        @keyframes angryShake {
            0%, 100% { transform: translateX(0) scale(0.95); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px) scale(0.95); }
            20%, 40%, 60%, 80% { transform: translateX(5px) scale(0.95); }
        }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>歴史肖像画クイズ</h1>
        <p>人物の問いに答えよ。<br>君の回答で、彼らの表情が変わるぞ！</p>
        <button class="menu-btn" onclick="showScreen('era-screen')">挑戦を始める</button>
    </div>

    <div id="era-screen" class="screen">
        <h2>時代を選択（1問30秒）</h2>
        <button class="menu-btn" onclick="startGame('sengoku')">戦国・江戸時代</button>
        <button class="menu-btn" onclick="startGame('ancient')">古代・中世</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer-container"><div id="timer-bar-fill"></div></div>
        <div id="game-progress" style="font-size: 0.8rem; margin-bottom: 5px;"></div>
        
        <div id="portrait-zone" class="portrait-frame">
            <img id="char-img" src="" alt="">
        </div>

        <div class="speech-bubble" id="dialogue"></div>

        <div id="input-area">
            <input type="text" id="user-answer" placeholder="答えを入力" autocomplete="off">
            <button id="submit-btn" class="menu-btn" onclick="processAnswer('manual')">回答する</button>
        </div>
        
        <button id="next-btn" class="menu-btn" onclick="nextQuestion()">次の問題へ →</button>
    </div>

    <div id="result-screen" class="screen">
        <h1>結果発表</h1>
        <p id="final-score" style="font-size: 1.3rem; line-height: 1.8;"></p>
        <button class="menu-btn" onclick="location.reload()">ホームに戻る</button>
    </div>

<script>
    // --- クイズデータ（画像パス構造を変更） ---
    const allQuizData = {
        sengoku: [
            { 
                name: "織田信長", 
                // 画像パターンを定義
                imgs: { default: "nobunaga.jpg", win: "nobunaga_win.jpg", lose: "nobunaga_lose.jpg" },
                msg: "私が「楽市楽座」を最初に行った城下町はどこか？", 
                answers: ["岐阜", "岐阜城", "ぎふ"], 
                info: "解説：1567年、信長は「岐阜」と改称。商売の自由を認める楽市楽座をここから始めました。" 
            },
            { 
                name: "徳川家康", 
                imgs: { default: "ieyasu.jpg", win: "ieyasu_win.jpg", lose: "ieyasu_lose.jpg" },
                msg: "私が江戸幕府を開いたのは西暦何年か？", 
                answers: ["1603", "1603年"], 
                info: "解説：1603年に征夷大将軍に任ぜられ、江戸に幕府を開きました。" 
            }
        ],
        ancient: [
            { 
                name: "クレオパトラ", 
                imgs: { default: "cleopatra.jpg", win: "cleopatra_win.jpg", lose: "cleopatra_lose.jpg" },
                msg: "私の死後、エジプトを支配した帝国はどこ？", 
                answers: ["ローマ", "ローマ帝国", "ろーま"], 
                info: "解説：アクティウムの海戦で敗北後、エジプトはローマ帝国の属州となりました。" 
            },
            { 
                name: "聖徳太子", 
                imgs: { default: "shotoku.jpg", win: "shotoku_win.jpg", lose: "shotoku_lose.jpg" },
                msg: "私が制定した、日本最初の憲法といえば？", 
                answers: ["十七条憲法", "17条憲法"], 
                info: "解説：604年制定。役人の心得を説いたもので、和を貴しとなすと述べられています。" 
            }
        ]
    };

    let currentEraData = [];
    let currentIdx = 0;
    let score = 0;
    const TIME_LIMIT = 30; // 1問30秒固定
    let timeLeft = 0;
    let timerInterval;

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame(era) {
        currentEraData = allQuizData[era];
        currentIdx = 0;
        score = 0;
        showScreen('game-screen');
        loadQuestion();
    }

    function loadQuestion() {
        const data = currentEraData[currentIdx];
        const input = document.getElementById('user-answer');
        const portraitZone = document.getElementById('portrait-zone');
        
        // --- UIリセット ---
        // 画像をデフォルトに戻す
        changePortrait('default');
        portraitZone.classList.remove('frame-correct', 'frame-wrong', 'angry-shake');
        
        document.getElementById('dialogue').innerHTML = `<strong>${data.name}</strong><br>${data.msg}`;
        document.getElementById('game-progress').innerText = `第 ${currentIdx + 1} 問 / 全 ${currentEraData.length} 問`;
        
        input.value = '';
        input.disabled = false;
        input.style.display = 'inline-block';
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        
        startQuestionTimer();
        input.focus();
    }

    // 画像切り替え用共通関数
    function changePortrait(type) {
        const data = currentEraData[currentIdx];
        const imgEl = document.getElementById('char-img');
        
        // 画像フェードアウト
        imgEl.style.opacity = 0;
        
        // わずかな遅延の後に画像を切り替えてフェードイン
        setTimeout(() => {
            imgEl.src = data.imgs[type];
            // 画像がない場合のaltテキスト設定
            let altSuffix = "";
            if(type === 'win') altSuffix = "（笑）";
            if(type === 'lose') altSuffix = "（怒）";
            imgEl.alt = data.name + altSuffix;
            
            imgEl.style.opacity = 1;
        }, 200);
    }

    function startQuestionTimer() {
        timeLeft = TIME_LIMIT;
        updateTimerBar();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerBar();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processAnswer('timeout');
            }
        }, 1000);
    }

    function updateTimerBar() {
        const percent = (timeLeft / TIME_LIMIT) * 100;
        document.getElementById('timer-bar-fill').style.width = percent + "%";
    }

    // --- 回答処理（ここが今回のキモ） ---
    function processAnswer(type) {
        clearInterval(timerInterval);
        const data = currentEraData[currentIdx];
        const portraitZone = document.getElementById('portrait-zone');
        const dialogue = document.getElementById('dialogue');
        const userAnswer = document.getElementById('user-answer').value.trim();
        
        let resultTitle = "";
        let titleColor = "";

        // 1. 正誤判定と演出の決定
        if (type === 'timeout') {
            // --- 時間切れ（負け扱い） ---
            changePortrait('lose'); // 怒る
            portraitZone.classList.add('frame-wrong', 'angry-shake'); // 赤枠＋振動
            resultTitle = "【時間切れ！】";
            titleColor = "var(--wrong)";
        } else {
            const isCorrect = data.answers.includes(userAnswer);
            if (isCorrect) {
                // --- 正解 ---
                score++;
                changePortrait('win'); // 笑う
                portraitZone.classList.add('frame-correct'); // 緑枠＋拡大
                resultTitle = "【正解！】";
                titleColor = "var(--correct)";
            } else {
                // --- 不正解 ---
                changePortrait('lose'); // 怒る
                portraitZone.classList.add('frame-wrong', 'angry-shake'); // 赤枠＋振動
                resultTitle = "【不正解…】";
                titleColor = "var(--wrong)";
            }
        }

        // 2. 解説の表示
        dialogue.innerHTML = `
            <span style="color:${titleColor}; font-weight:bold;">${resultTitle}</span><br>
            ${data.msg}
            <div class="info-box">${data.info}</div>
        `;

        // 3. UI切り替え
        document.getElementById('user-answer').disabled = true;
        document.getElementById('submit-btn').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentEraData.length) {
            loadQuestion();
        } else {
            finishGame();
        }
    }

    function finishGame() {
        showScreen('result-screen');
        let msg = (score === currentEraData.length) ? "全問正解！素晴らしい！" : "次は全問正解を目指そう！";
        document.getElementById('final-score').innerText = 
            `正解数: ${score} / ${currentEraData.length}\n${msg}`;
    }

    document.getElementById('user-answer').addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && document.getElementById('submit-btn').style.display !== 'none') {
            processAnswer('manual');
        }
    });

</script>
</body>
</html>
