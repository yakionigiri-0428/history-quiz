<style>
    /* 称号用のスタイル追加 */
    .title-display {
        font-size: 2rem;
        color: var(--gold);
        background: rgba(255,255,255,0.1);
        padding: 10px 30px;
        border-radius: 50px;
        margin: 10px 0;
        border: 2px solid var(--gold);
        text-shadow: 0 0 10px rgba(212,175,55,0.5);
        display: inline-block;
    }
    .rank-tag {
        font-size: 0.8rem;
        padding: 2px 8px;
        border-radius: 4px;
        margin-left: 5px;
        vertical-align: middle;
    }
</style>

<div id="result-screen" class="screen" style="justify-content: center; align-items: center; padding: 20px;">
    <h1 style="color:var(--gold); margin-bottom:5px;">戦績発表</h1>
    <div id="final-stats" style="color:#fff; text-align:center;"></div>
    
    <div id="title-area" class="title-display"></div>
    
    <div style="background:rgba(255,255,255,0.1); padding:20px; border-radius:15px; width:100%; max-width:400px; margin-top:20px;">
        <h3 style="color:var(--gold); margin:0 0 10px 0; text-align:center;">全国ランキング（TOP 5）</h3>
        <table class="ranking-table" id="ranking-list"></table>
    </div>
    
    <button class="menu-btn" onclick="location.reload()" style="margin-top:20px;">再挑戦する</button>
</div>

<script>
    // --- 称号判定ロジック ---
    function getTitle(score, correctCount, totalCount) {
        const perfectScorePossible = totalCount * 2500; // 1問1000点+30秒×50点=2500点
        const ratio = score / perfectScorePossible;

        if (correctCount === totalCount && ratio > 0.8) return "神速の聖人";
        if (correctCount === totalCount) return "知略の将軍";
        if (correctCount >= totalCount / 2) return "歴戦の侍";
        if (correctCount > 0) return "修行中の身";
        return "迷い込んだ農民";
    }

    // --- 結果表示の修正 ---
    function showFinalResult() {
        showScreen('result-screen');
        document.getElementById('bg-image').style.opacity = 0.3;
        
        // 正解数をカウント（簡易的に全問正解か判定するため変数を調整）
        const correctCount = score; // startGameで管理している正解数
        const totalCount = currentEraData.questions.length;
        const myTitle = getTitle(totalScore, correctCount, totalCount);

        document.getElementById('final-stats').innerHTML = `
            <p style="margin:0;">${playerName}殿</p>
            <span style="font-size:2.5rem; color:var(--gold); font-weight:bold;">${totalScore.toLocaleString()} 点</span>
            <p>（正解数: ${correctCount} / ${totalCount}）</p>
        `;
        
        const titleArea = document.getElementById('title-area');
        titleArea.innerText = `称号：${myTitle}`;

        saveAndDisplayRanking(myTitle);
    }

    // --- ランキング保存の修正 ---
    function saveAndDisplayRanking(myTitle) {
        let ranking = JSON.parse(localStorage.getItem('historyQuizRankingV2') || '[]');
        ranking.push({ 
            name: playerName, 
            score: totalScore, 
            title: myTitle,
            date: new Date().toLocaleDateString() 
        });
        
        ranking.sort((a, b) => b.score - a.score);
        ranking = ranking.slice(0, 5);
        localStorage.setItem('historyQuizRankingV2', JSON.stringify(ranking));

        const listEl = document.getElementById('ranking-list');
        listEl.innerHTML = `<tr><th>位</th><th>名</th><th>称号</th><th>点</th></tr>`;
        ranking.forEach((entry, index) => {
            const isMe = (entry.name === playerName && entry.score === totalScore);
            listEl.innerHTML += `
                <tr style="${isMe ? 'background:rgba(212,175,55,0.2);' : ''}">
                    <td class="${index === 0 ? 'gold-rank' : ''}">${index + 1}</td>
                    <td>${entry.name}</td>
                    <td style="font-size:0.7rem; opacity:0.8;">${entry.title}</td>
                    <td>${entry.score.toLocaleString()}</td>
                </tr>`;
        });
    }
</script>
