<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI肖像画 歴史記述クイズ</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1e1e1e;
            --paper: #fdf5e6;
            --correct: #4caf50;
            --wrong: #f44336;
        }

        body {
            background-color: var(--dark);
            color: #333;
            font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-card {
            background: var(--paper);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border: 3px double var(--gold);
            text-align: center;
            transition: transform 0.3s ease;
        }

        #progress {
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .portrait-frame {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            border: 6px solid #333;
            background: #ccc;
            overflow: hidden;
            border-radius: 50%;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
        }

        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease-out;
        }

        .speech-bubble {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
            font-size: 1.1rem;
            min-height: 60px;
        }

        .info-text {
            display: block;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #666;
            border-top: 1px dashed #ccc;
            padding-top: 10px;
        }

        /* 入力エリアのスタイル */
        .input-container {
            margin-bottom: 20px;
        }

        #user-answer {
            width: 80%;
            padding: 12px;
            font-size: 1.1rem;
            border: 2px solid #aaa;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
            text-align: center;
        }

        #user-answer:focus {
            border-color: var(--gold);
        }

        #submit-btn, #next-btn {
            background: #333;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
        }

        #next-btn {
            display: none;
            background: var(--gold);
        }

        /* アニメーション */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

<div id="game-card">
    <div id="progress"></div>
    <div class="portrait-frame">
        <img id="char-img" src="" alt="人物肖像">
    </div>
    <div class="speech-bubble" id="dialogue">読み込み中...</div>

    <div class="input-container" id="input-area">
        <input type="text" id="user-answer" placeholder="答えを入力してください" autocomplete="off">
        <button id="submit-btn" onclick="checkAnswer()">回答する</button>
    </div>

    <button id="next-btn" onclick="nextStage()"></button>
</div>

<script>
    const quizData = [
        {
            name: "織田信長",
            img: "nobunaga.jpg",
            msg: "我は織田信長。私が「楽市楽座」を最初に行った城下町はどこか答えてみよ。",
            // 揺れを考慮して配列で持たせる
            answers: ["岐阜城", "岐阜", "ぎふ", "ぎふじょう"], 
            correct: "その通り！天下布武の始まりはこの地からよ。",
            wrong: "笑わせるな。そんな基礎も知らぬとは。もう一度考え直せ。",
            info: "解説：1567年、信長は斎藤氏を滅ぼすと「井口」を「岐阜」と改め、楽市楽座令を発布して商工業を活性化させました。"
        },
        {
            name: "クレオパトラ",
            img: "cleopatra.jpg",
            msg: "エジプトの太陽、クレオパトラよ。私の死後、エジプトを支配した帝国はどこかしら？",
            answers: ["ローマ帝国", "ローマ", "ろーま", "ろーまていこく"],
            correct: "正解よ。歴史の流れをよく理解しているわね。",
            wrong: "残念。私の最後を汚さないで頂戴。やり直しよ。",
            info: "解説：プトレマイオス朝最後の女王。彼女の死後、エジプトは古代ローマの初代皇帝オクタウィアヌスによって属州とされました。"
        }
    ];

    let currentIdx = 0;

    function loadStage() {
        const data = quizData[currentIdx];
        const card = document.getElementById('game-card');
        const img = document.getElementById('char-img');
        const dialogue = document.getElementById('dialogue');
        const input = document.getElementById('user-answer');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');

        // リセット
        card.classList.remove('shake');
        img.style.transform = 'scale(1.0)';
        dialogue.innerHTML = data.msg;
        input.value = '';
        input.disabled = false;
        input.style.display = 'inline-block';
        submitBtn.style.display = 'block';
        nextBtn.style.display = 'none';
        
        document.getElementById('progress').innerText = `第 ${currentIdx + 1} 問 / 全 ${quizData.length} 問`;
        img.src = data.img;
        img.alt = data.name;

        // 入力欄にフォーカス
        input.focus();
    }

    function checkAnswer() {
        const data = quizData[currentIdx];
        const input = document.getElementById('user-answer');
        const userAnswer = input.value.trim();
        const dialogue = document.getElementById('dialogue');
        const img = document.getElementById('char-img');
        const card = document.getElementById('game-card');

        if (!userAnswer) return; // 空送信防止

        // 正解配列のいずれかと一致するかチェック
        const isCorrect = data.answers.includes(userAnswer);

        if (isCorrect) {
            // 正解演出
            input.disabled = true;
            document.getElementById('submit-btn').style.display = 'none';
            img.style.transform = 'scale(1.1)';
            dialogue.innerHTML = `<strong>【正解！】</strong><br>${data.correct}<span class="info-text">${data.info}</span>`;
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = (currentIdx < quizData.length - 1) ? "次の人物へ →" : "結果を見る";
            nextBtn.style.display = 'block';
            nextBtn.focus();
        } else {
            // 不正解演出
            card.classList.remove('shake');
            void card.offsetWidth; // リフロー発生させてアニメーションを再トリガー
            card.classList.add('shake');
            dialogue.innerHTML = `<strong>【不正解…】</strong><br>${data.wrong}`;
            input.value = '';
            input.focus();
        }
    }

    function nextStage() {
        currentIdx++;
        if (currentIdx < quizData.length) {
            loadStage();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.querySelector('.portrait-frame').style.display = 'none';
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('progress').style.display = 'none';
        document.getElementById('dialogue').innerHTML = `
            <div style="font-size:1.5rem; color:var(--gold); font-weight:bold; margin-bottom:10px;">完全制覇！</div>
            全ての歴史の問いに答えました。<br>あなたの筆さばき、実に見事であった！
        `;
        const nextBtn = document.getElementById('next-btn');
        nextBtn.innerText = "もう一度挑戦する";
        nextBtn.onclick = () => location.reload();
    }

    // Enterキーで回答送信できるように設定
    document.getElementById('user-answer').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });

    window.onload = loadStage;
</script>

</body>
</html>
