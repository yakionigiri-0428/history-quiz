<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>時空を超えた歴史クイズ</title>
    <style>
        /* デザイン設定 */
        :root {
            --gold: #d4af37;
            --dark-bg: #1a1a1a;
            --paper: #f4e4bc;
        }

        body {
            background-color: var(--dark-bg);
            color: #333;
            font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-card {
            background: var(--paper);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 100px rgba(0,0,0,0.1);
            border: 2px solid var(--gold);
            text-align: center;
            position: relative;
        }

        /* 肖像画のエリア */
        .portrait-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            border: 4px solid #444;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            background: #ccc;
            transition: transform 0.3s ease;
        }

        .portrait-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 吹き出し */
        .speech-bubble {
            background: rgba(255,255,255,0.8);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 1.1rem;
            line-height: 1.6;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ccc;
        }

        /* 選択肢ボタン */
        .choice-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: 1px solid #888;
            background: #eee;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--gold);
            color: white;
        }

        #next-btn {
            margin-top: 20px;
            width: 100%;
            background: #444;
            color: white;
            display: none;
        }

        /* アニメーション */
        .fade-in { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<div id="game-card" class="fade-in">
    <div class="portrait-container" id="portrait-frame">
        <img id="char-img" src="" alt="肖像画">
    </div>
    
    <div class="speech-bubble" id="dialogue">
        </div>

    <div class="choice-grid" id="choices">
        </div>

    <button id="next-btn" onclick="nextLevel()">次の時代へ進む</button>
</div>

<script>
    /** * 【設定ガイド】
     * 以下の quizData の中身を書き換えるだけで、
     * 登場人物やクイズを自由に変更・追加できます。
     */
    const quizData = [
        {
            name: "レオナルド・ダ・ヴィンチ",
            img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Francesco_Melzi_-_Portrait_of_Leonardo_da_Vinci_-_Google_Art_Project.jpg/400px-Francesco_Melzi_-_Portrait_of_Leonardo_da_Vinci_-_Google_Art_Project.jpg",
            message: "万能の天才と呼ばれた私だが…さて、私が描いた『モナ・リザ』が現在展示されている美術館はどこかな？",
            options: ["大英博物館", "ルーヴル美術館", "メトロポリタン美術館", "ウフィツィ美術館"],
            answer: 1, // 0から数えて1番目（ルーヴル）
            correctMsg: "正解だ。私の傑作をぜひその目で確かめてくれたまえ。",
            wrongMsg: "ふむ、まだ芸術の修行が足りないようだな。"
        },
        {
            name: "クレオパトラ",
            img: "https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Cleopatra_VII_Altes_Museum_Berlin.jpg/400px-Cleopatra_VII_Altes_Museum_Berlin.jpg",
            message: "エジプトの女王たる私に会えるとは光栄に思いなさい。私が愛したとされる、ローマの英雄は誰？",
            options: ["スパルタクス", "ネロ", "カエサル", "ハンニバル"],
            answer: 2,
            correctMsg: "その通り。あなたは歴史に詳しいようね。",
            wrongMsg: "無礼者！私の歴史を侮辱するつもり？"
        }
    ];

    let currentIdx = 0;

    function loadQuiz() {
        const stage = quizData[currentIdx];
        document.getElementById('char-img').src = stage.img;
        document.getElementById('dialogue').innerText = stage.message;
        
        const choiceContainer = document.getElementById('choices');
        choiceContainer.innerHTML = ''; // リセット
        document.getElementById('next-btn').style.display = 'none';

        stage.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(i);
            choiceContainer.appendChild(btn);
        });
    }

    function selectAnswer(i) {
        const stage = quizData[currentIdx];
        const dialogue = document.getElementById('dialogue');
        
        if (i === stage.answer) {
            dialogue.innerHTML = `<strong>【正解！】</strong><br>${stage.correctMsg}`;
            document.getElementById('next-btn').style.display = 'block';
            // 正解時に少し肖像画を大きくする演出
            document.getElementById('portrait-frame').style.transform = 'scale(1.1)';
        } else {
            dialogue.innerText = stage.wrongMsg;
            document.getElementById('portrait-frame').style.transform = 'scale(0.9)';
        }
    }

    function nextLevel() {
        currentIdx++;
        document.getElementById('portrait-frame').style.transform = 'scale(1.0)';
        if (currentIdx < quizData.length) {
            loadQuiz();
        } else {
            document.getElementById('dialogue').innerText = "素晴らしい！君は真の歴史マスターだ。また会おう！";
            document.getElementById('choices').innerHTML = '';
            document.getElementById('next-btn').innerText = "最初から遊ぶ";
            document.getElementById('next-btn').onclick = () => location.reload();
            document.getElementById('next-btn').style.display = 'block';
        }
    }

    // 初回読み込み
    window.onload = loadQuiz;

</script>

</body>
</html>
