<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI歴史肖像画クイズ 究極版</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1e1e1e;
            --paper: #fdf5e6;
            --correct: #4caf50;
            --wrong: #f44336;
            --era-color: var(--gold); /* 時代によって可変 */
        }

        body {
            background-color: var(--dark);
            color: #333;
            font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.5s ease;
        }

        .screen {
            display: none;
            background: var(--paper);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 3px double var(--era-color);
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        .active { display: block; }

        h1, h2 { color: #222; border-bottom: 2px solid var(--era-color); padding-bottom: 10px; margin-top: 0; }

        .menu-btn {
            background: #333;
            color: white;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .menu-btn:hover { background: var(--era-color); transform: translateY(-2px); }

        /* タイマーバーの進化 */
        #timer-container {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #ccc;
        }
        #timer-bar-fill {
            height: 100%;
            width: 100%;
            background: var(--era-color);
            transition: width 1s linear, background-color 0.5s;
        }

        /* 肖像画演出 */
        .portrait-frame {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            border: 6px solid #333;
            background: #fff;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .portrait-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .frame-correct { border-color: var(--correct); box-shadow: 0 0 25px var(--correct); transform: scale(1.1); }
        .frame-wrong { border-color: var(--wrong); box-shadow: 0 0 25px var(--wrong); transform: scale(0.95); }

        /* セリフと解説 */
        .speech-bubble {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            margin-bottom: 20px;
            min-height: 100px;
            text-align: left;
            position: relative;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .info-box {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 2px dotted var(--era-color);
            font-size: 0.95rem;
            color: #444;
            line-height: 1.5;
            animation: slideUp 0.4s ease-out;
        }

        #user-answer {
            width: 85%;
            padding: 15px;
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 2px solid #ddd;
            outline: none;
            transition: border-color 0.3s;
        }
        #user-answer:focus { border-color: var(--era-color); }

        #next-btn { background: var(--era-color); display: none; margin-top: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes angryShake {
            0%, 100% { transform: translateX(0) scale(0.95); }
            25% { transform: translateX(-10px) scale(0.95); }
            75% { transform: translateX(10px) scale(0.95); }
        }
        .angry-shake { animation: angryShake 0.1s ease-in-out infinite; animation-iteration-count: 4; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>歴史肖像画クイズ</h1>
        <p>人物の問いに答えよ。<br>正解すれば彼らも微笑むだろう。</p>
        <button class="menu-btn" onclick="showScreen('era-screen')">挑戦を始める</button>
    </div>

    <div id="era-screen" class="screen">
        <h2>時代を選択</h2>
        <button class="menu-btn" style="border-left: 8px solid #e74c3c;" onclick="startGame('sengoku')">戦国・江戸時代</button>
        <button class="menu-btn" style="border-left: 8px solid #3498db;" onclick="startGame('ancient')">古代・中世</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer-container"><div id="timer-bar-fill"></div></div>
        <div id="game-progress" style="font-weight: bold; margin-bottom: 10px;"></div>
        
        <div id="portrait-zone" class="portrait-frame">
            <img id="char-img" src="" alt="人物肖像">
        </div>

        <div class="speech-bubble" id="dialogue"></div>

        <div id="input-area">
            <input type="text" id="user-answer" placeholder="答えを入力" autocomplete="off">
            <button id="submit-btn" class="menu-btn" onclick="processAnswer('manual')">回答を献上する</button>
        </div>
        
        <button id="next-btn" class="menu-btn" onclick="nextQuestion()">次の問題へ進む</button>
    </div>

    <div id="result-screen" class="screen">
        <h1 id="result-title">結果発表</h1>
        <p id="final-score" style="font-size: 1.4rem; font-weight: bold;"></p>
        <button class="menu-btn" onclick="location.reload()">ホームに戻る</button>
    </div>

<script>
    const allQuizData = {
        sengoku: {
            color: "#e74c3c", // 戦国の赤
            questions: [
                { name: "織田信長", imgs: { default: "nobunaga.jpg", win: "nobunaga_win.jpg", lose: "nobunaga_lose.jpg" }, msg: "私が「楽市楽座」を最初に行った城下町はどこか？", answers: ["岐阜", "岐阜城", "ぎふ"], info: "1567年、信長は「岐阜」と改称し、この地から独占販売権を撤廃する「楽市楽座」を広めました。" },
                { name: "徳川家康", imgs: { default: "ieyasu.jpg", win: "ieyasu_win.jpg", lose: "ieyasu_lose.jpg" }, msg: "江戸幕府が開かれたのは西暦何年か？", answers: ["1603", "1603年"], info: "関ヶ原の戦いを経て1603年、家康は征夷大将軍に任命され、260年続く幕府の礎を築きました。" }
            ]
        },
        ancient: {
            color: "#3498db", // 古代の青
            questions: [
                { name: "クレオパトラ", imgs: { default: "cleopatra.jpg", win: "cleopatra_win.jpg", lose: "cleopatra_lose.jpg" }, msg: "私の死後、エジプトを支配下に置いた帝国はどこ？", answers: ["ローマ", "ローマ帝国", "ろーま"], info: "アクティウムの海戦での敗北後、エジプトはローマ帝国の属州となり、王朝の歴史は幕を閉じました。" },
                { name: "聖徳太子", imgs: { default: "shotoku.jpg", win: "shotoku_win.jpg", lose: "shotoku_lose.jpg" }, msg: "私が制定した、日本最初の憲法といえば何？", answers: ["十七条憲法", "17条憲法", "じゅうななじょうけんぽう"], info: "「和をもって貴しとなす」で知られるこの憲法は、仏教や儒教の精神を取り入れ、官吏の心得を説きました。" }
            ]
        }
    };

    let currentEraData = null;
    let currentIdx = 0;
    let score = 0;
    const TIME_LIMIT = 30; 
    let timeLeft = 0;
    let timerInterval;

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame(eraKey) {
        currentEraData = allQuizData[eraKey];
        // 時代のテーマカラーをセット
        document.documentElement.style.setProperty('--era-color', currentEraData.color);
        
        currentIdx = 0;
        score = 0;
        showScreen('game-screen');
        loadQuestion();
    }

    function loadQuestion() {
        const data = currentEraData.questions[currentIdx];
        const portraitZone = document.getElementById('portrait-zone');
        
        changePortrait('default');
        portraitZone.classList.remove('frame-correct', 'frame-wrong', 'angry-shake');
        
        document.getElementById('dialogue').innerHTML = `<strong>${data.name}：</strong><br>${data.msg}`;
        document.getElementById('game-progress').innerText = `【 第 ${currentIdx + 1} 問 / 全 ${currentEraData.questions.length} 問 】`;
        
        const input = document.getElementById('user-answer');
        input.value = '';
        input.disabled = false;
        document.getElementById('input-area').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        
        startQuestionTimer();
        setTimeout(() => input.focus(), 500); // 遷移後のフォーカス
    }

    function changePortrait(type) {
        const data = currentEraData.questions[currentIdx];
        const imgEl = document.getElementById('char-img');
        imgEl.style.opacity = 0;
        setTimeout(() => {
            imgEl.src = data.imgs[type];
            imgEl.style.opacity = 1;
        }, 150);
    }

    function startQuestionTimer() {
        timeLeft = TIME_LIMIT;
        updateTimerBar();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerBar();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                processAnswer('timeout');
            }
        }, 1000);
    }

    function updateTimerBar() {
        const percent = (timeLeft / TIME_LIMIT) * 100;
        document.getElementById('timer-bar-fill').style.width = percent + "%";
    }

    function processAnswer(mode) {
        clearInterval(timerInterval);
        const data = currentEraData.questions[currentIdx];
        const portraitZone = document.getElementById('portrait-zone');
        const dialogue = document.getElementById('dialogue');
        const userAnswer = document.getElementById('user-answer').value.trim();
        
        let statusText = "";
        let isCorrect = false;

        if (mode === 'timeout') {
            statusText = "<span style='color:var(--wrong)'>【 時間切れ 】</span>";
            changePortrait('lose');
            portraitZone.classList.add('frame-wrong', 'angry-shake');
        } else {
            isCorrect = data.answers.includes(userAnswer);
            if (isCorrect) {
                score++;
                statusText = "<span style='color:var(--correct)'>【 正解 】</span>";
                changePortrait('win');
                portraitZone.classList.add('frame-correct');
            } else {
                statusText = "<span style='color:var(--wrong)'>【 不正解 】</span>";
                changePortrait('lose');
                portraitZone.classList.add('frame-wrong', 'angry-shake');
            }
        }

        dialogue.innerHTML = `
            ${statusText}<br><strong>${data.name}：</strong> ${data.msg}
            <div class="info-box"><strong>解説：</strong> ${data.info}</div>
        `;

        document.getElementById('input-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentEraData.questions.length) {
            loadQuestion();
        } else {
            finishGame();
        }
    }

    function finishGame() {
        showScreen('result-screen');
        const total = currentEraData.questions.length;
        let rankMsg = "";
        if(score === total) rankMsg = "歴史の生き字引ですね！";
        else if(score >= total/2) rankMsg = "かなりの腕前です！";
        else rankMsg = "のびしろ十分。また学びましょう！";

        document.getElementById('final-score').innerHTML = `
            正解数: ${score} / ${total}<br>
            <span style="font-size: 1rem; color: #666;">${rankMsg}</span>
        `;
    }

    document.getElementById('user-answer').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') processAnswer('manual');
    });

</script>
</body>
</html>
