<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI歴史肖像画クイズ Master</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1e1e1e;
            --paper: #fdf5e6;
            --correct: #4caf50;
            --wrong: #f44336;
        }

        body {
            background-color: var(--dark);
            color: #333;
            font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .screen {
            display: none; /* 基本は非表示 */
            background: var(--paper);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            border: 3px double var(--gold);
            text-align: center;
            animation: fadeIn 0.5s;
        }

        .active { display: block; } /* activeクラスがついた画面だけ表示 */

        h1 { color: #333; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        p { line-height: 1.6; }

        /* ボタンデザイン共通 */
        .menu-btn {
            background: #333;
            color: white;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .menu-btn:hover { background: var(--gold); }

        /* ゲーム画面専用 */
        #timer-bar {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--wrong);
            margin-bottom: 10px;
        }

        .portrait-frame {
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
            border: 5px solid #333;
            background: #ccc;
            border-radius: 50%;
            overflow: hidden;
        }
        .portrait-frame img { width: 100%; height: 100%; object-fit: cover; }

        #user-answer {
            width: 80%;
            padding: 12px;
            font-size: 1.1rem;
            margin-bottom: 10px;
            text-align: center;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>歴史肖像画クイズ</h1>
        <p>肖像画の人物からの問いに答えよ。<br>すべての時代を制覇できるか？</p>
        <button class="menu-btn" onclick="showScreen('time-screen')">挑戦を始める</button>
    </div>

    <div id="time-screen" class="screen">
        <h2>制限時間を選択</h2>
        <button class="menu-btn" onclick="setTimer(30)">30秒（短期決戦）</button>
        <button class="menu-btn" onclick="setTimer(60)">60秒（じっくり）</button>
    </div>

    <div id="era-screen" class="screen">
        <h2>時代を選択</h2>
        <button class="menu-btn" onclick="startGame('sengoku')">戦国・江戸時代</button>
        <button class="menu-btn" onclick="startGame('ancient')">古代・中世（世界/日本）</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer-bar">残り時間: --</div>
        <div id="game-progress" style="font-size: 0.8rem; color: #666;"></div>
        <div class="portrait-frame">
            <img id="char-img" src="" alt="">
        </div>
        <div id="dialogue" style="min-height: 80px; margin-bottom: 15px;"></div>
        <input type="text" id="user-answer" placeholder="答えを入力" autocomplete="off">
        <button id="submit-btn" class="menu-btn" onclick="checkAnswer()">回答する</button>
        <button id="next-btn" class="menu-btn" style="display:none; background:var(--gold);" onclick="nextQuestion()">次の問題へ</button>
    </div>

    <div id="result-screen" class="screen">
        <h1>結果発表</h1>
        <p id="final-score" style="font-size: 1.5rem; font-weight: bold;"></p>
        <button class="menu-btn" onclick="location.reload()">ホームに戻る</button>
    </div>

<script>
    // --- クイズデータ ---
    const allQuizData = {
        sengoku: [
            { name: "織田信長", img: "nobunaga.jpg", msg: "「楽市楽座」を最初に行った城下町は？", answers: ["岐阜", "岐阜城", "ぎふ"], info: "1567年に発布されました。" },
            { name: "徳川家康", img: "ieyasu.jpg", msg: "征夷大将軍に任命され、江戸幕府を開いたのは西暦何年？", answers: ["1603", "1603年"], info: "関ヶ原の戦いの3年後です。" }
        ],
        ancient: [
            { name: "クレオパトラ", img: "cleopatra.jpg", msg: "プトレマイオス朝最後の女王である私の国はどこ？", answers: ["エジプト", "古代エジプト"], info: "ローマの属州となりました。" },
            { name: "聖徳太子", img: "shotoku.jpg", msg: "私が制定した、日本最初の憲法といえば？", answers: ["十七条憲法", "17条憲法"], info: "推古天皇の摂政として活躍しました。" }
        ]
    };

    let currentEraData = [];
    let currentIdx = 0;
    let score = 0;
    let timeLeft = 0;
    let timerInterval;

    // 画面切り替え関数
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // 制限時間の設定
    function setTimer(seconds) {
        timeLeft = seconds;
        showScreen('era-screen');
    }

    // ゲーム開始
    function startGame(era) {
        currentEraData = allQuizData[era];
        currentIdx = 0;
        score = 0;
        showScreen('game-screen');
        loadQuestion();
        startTimer();
    }

    // タイマー開始
    function startTimer() {
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finishGame("タイムアップ！");
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        document.getElementById('timer-bar').innerText = `残り時間: ${timeLeft}秒`;
    }

    // 問題読み込み
    function loadQuestion() {
        const data = currentEraData[currentIdx];
        document.getElementById('char-img').src = data.img;
        document.getElementById('dialogue').innerHTML = `<strong>${data.name}</strong><br>${data.msg}`;
        document.getElementById('user-answer').value = '';
        document.getElementById('user-answer').disabled = false;
        document.getElementById('user-answer').focus();
        document.getElementById('submit-btn').style.display = 'block';
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('game-progress').innerText = `${currentIdx + 1} / ${currentEraData.length}`;
    }

    // 答え合わせ
    function checkAnswer() {
        const input = document.getElementById('user-answer').value.trim();
        const data = currentEraData[currentIdx];
        const isCorrect = data.answers.includes(input);

        if (isCorrect) {
            score++;
            document.getElementById('dialogue').innerHTML = `<strong>正解！</strong><br>${data.info}`;
            document.getElementById('user-answer').disabled = true;
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
        } else {
            document.getElementById('game-screen').classList.add('shake');
            setTimeout(() => document.getElementById('game-screen').classList.remove('shake'), 400);
            document.getElementById('user-answer').value = '';
        }
    }

    // 次の問題へ
    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentEraData.length) {
            loadQuestion();
        } else {
            clearInterval(timerInterval);
            finishGame("全問終了！");
        }
    }

    // ゲーム終了
    function finishGame(reason) {
        showScreen('result-screen');
        document.getElementById('final-score').innerText = `${reason}\n正解数: ${score} / ${currentEraData.length}`;
    }

    // Enterキー対応
    document.getElementById('user-answer').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAnswer();
    });

</script>
</body>
</html>
