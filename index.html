<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI歴史クイズ 連続挑戦版</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1e1e1e;
            --paper: #fdf5e6;
            --correct: #4caf50;
            --wrong: #f44336;
            --era-color: var(--gold);
        }

        body {
            background-color: var(--dark);
            color: #333;
            font-family: 'Hiragino Mincho ProN', 'MS Mincho', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .screen {
            display: none;
            background: var(--paper);
            width: 90%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 3px double var(--era-color);
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        .active { display: block; }

        h1, h2 { color: #222; border-bottom: 2px solid var(--era-color); padding-bottom: 10px; margin-top: 0; }

        .menu-btn {
            background: #333;
            color: white;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .menu-btn:hover:not(:disabled) { background: var(--era-color); transform: translateY(-2px); }
        .menu-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        #timer-container {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 6px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #ccc;
        }
        #timer-bar-fill {
            height: 100%;
            width: 100%;
            background: var(--era-color);
            transition: width 1s linear;
        }

        .portrait-frame {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            border: 6px solid #333;
            background: #fff;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            transition: all 0.3s;
        }
        
        .portrait-frame img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s; }

        .frame-correct { border-color: var(--correct); box-shadow: 0 0 25px var(--correct); transform: scale(1.1); }
        .frame-wrong { border-color: var(--wrong); box-shadow: 0 0 15px var(--wrong); }

        .speech-bubble {
            background: white;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #eee;
            margin-bottom: 20px;
            min-height: 100px;
            text-align: left;
        }

        .info-box { margin-top: 12px; padding-top: 12px; border-top: 2px dotted var(--era-color); font-size: 0.95rem; color: #444; }

        #user-answer {
            width: 85%;
            padding: 15px;
            font-size: 1.2rem;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 2px solid #ddd;
            outline: none;
            text-align: center;
        }
        #user-answer:focus { border-color: var(--era-color); }

        #next-btn { background: var(--era-color); display: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes angryShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .angry-shake { animation: angryShake 0.1s ease-in-out infinite; animation-iteration-count: 3; }
    </style>
</head>
<body>

    <div id="home-screen" class="screen active">
        <h1>歴史肖像画クイズ</h1>
        <p>時間内なら何度でも回答可能！<br>正解を導き出し、彼らを満足させよ。</p>
        <button class="menu-btn" onclick="showScreen('era-screen')">挑戦を始める</button>
    </div>

    <div id="era-screen" class="screen">
        <h2>時代を選択（1問30秒）</h2>
        <button class="menu-btn" style="border-left: 8px solid #e74c3c;" onclick="startGame('sengoku')">戦国・江戸時代</button>
        <button class="menu-btn" style="border-left: 8px solid #3498db;" onclick="startGame('ancient')">古代・中世</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer-container"><div id="timer-bar-fill"></div></div>
        <div id="game-progress" style="font-weight: bold; margin-bottom: 10px;"></div>
        
        <div id="portrait-zone" class="portrait-frame">
            <img id="char-img" src="" alt="人物肖像">
        </div>

        <div class="speech-bubble" id="dialogue"></div>

        <div id="input-area">
            <input type="text" id="user-answer" placeholder="答えを入力" autocomplete="off">
            <button id="submit-btn" class="menu-btn" onclick="checkAttempt()">回答する</button>
        </div>
        
        <button id="next-btn" class="menu-btn" onclick="nextQuestion()">次の問題へ進む</button>
    </div>

    <div id="result-screen" class="screen">
        <h1>結果発表</h1>
        <p id="final-score" style="font-size: 1.4rem; font-weight: bold;"></p>
        <button class="menu-btn" onclick="location.reload()">ホームに戻る</button>
    </div>

<script>
    const allQuizData = {
        sengoku: {
            color: "#e74c3c",
            questions: [
                { name: "織田信長", imgs: { default: "nobunaga.jpg", win: "nobunaga_win.jpg", lose: "nobunaga_lose.jpg" }, msg: "私が「楽市楽座」を最初に行った城下町はどこか？", answers: ["岐阜", "岐阜城", "ぎふ"], info: "1567年、信長は「岐阜」と改称し、ここから「楽市楽座」を広めました。" },
                { name: "徳川家康", imgs: { default: "ieyasu.jpg", win: "ieyasu_win.jpg", lose: "ieyasu_lose.jpg" }, msg: "江戸幕府が開かれたのは西暦何年か？", answers: ["1603", "1603年"], info: "1603年、家康は征夷大将軍に任命され、江戸に幕府を開きました。" }
            ]
        },
        ancient: {
            color: "#3498db",
            questions: [
                { name: "クレオパトラ", imgs: { default: "cleopatra.jpg", win: "cleopatra_win.jpg", lose: "cleopatra_lose.jpg" }, msg: "私の死後、エジプトを支配した帝国はどこ？", answers: ["ローマ", "ローマ帝国", "ろーま"], info: "彼女の死後、エジプトはローマ帝国の属州となりました。" },
                { name: "聖徳太子", imgs: { default: "shotoku.jpg", win: "shotoku_win.jpg", lose: "shotoku_lose.jpg" }, msg: "私が制定した、日本最初の憲法といえば何？", answers: ["十七条憲法", "17条憲法", "じゅうななじょうけんぽう"], info: "604年制定。官吏の心得を説いたもので、和の精神を強調しています。" }
            ]
        }
    };

    let currentEraData = null;
    let currentIdx = 0;
    let score = 0;
    const TIME_LIMIT = 30; 
    let timeLeft = 0;
    let timerInterval;
    let isLocked = false; // 回答処理中のロック

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame(eraKey) {
        currentEraData = allQuizData[eraKey];
        document.documentElement.style.setProperty('--era-color', currentEraData.color);
        currentIdx = 0;
        score = 0;
        showScreen('game-screen');
        loadQuestion();
    }

    function loadQuestion() {
        isLocked = false;
        const data = currentEraData.questions[currentIdx];
        const portraitZone = document.getElementById('portrait-zone');
        
        changePortrait('default');
        portraitZone.classList.remove('frame-correct', 'frame-wrong', 'angry-shake');
        
        document.getElementById('dialogue').innerHTML = `<strong>${data.name}：</strong><br>${data.msg}`;
        document.getElementById('game-progress').innerText = `【 第 ${currentIdx + 1} 問 / 全 ${currentEraData.questions.length} 問 】`;
        
        const input = document.getElementById('user-answer');
        input.value = '';
        input.disabled = false;
        document.getElementById('input-area').style.display = 'block';
        document.getElementById('submit-btn').disabled = false;
        document.getElementById('next-btn').style.display = 'none';
        
        startQuestionTimer();
        setTimeout(() => input.focus(), 500);
    }

    function changePortrait(type) {
        const data = currentEraData.questions[currentIdx];
        const imgEl = document.getElementById('char-img');
        imgEl.style.opacity = 0;
        setTimeout(() => {
            imgEl.src = data.imgs[type];
            imgEl.style.opacity = 1;
        }, 150);
    }

    function startQuestionTimer() {
        timeLeft = TIME_LIMIT;
        updateTimerBar();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerBar();
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                finishQuestion('timeout');
            }
        }, 1000);
    }

    function updateTimerBar() {
        const percent = (timeLeft / TIME_LIMIT) * 100;
        document.getElementById('timer-bar-fill').style.width = percent + "%";
    }

    // --- 何度でも挑戦できる回答チェック ---
    function checkAttempt() {
        if (isLocked || timeLeft <= 0) return;

        const data = currentEraData.questions[currentIdx];
        const userAnswer = document.getElementById('user-answer').value.trim();
        const portraitZone = document.getElementById('portrait-zone');
        
        if (data.answers.includes(userAnswer)) {
            // 正解：タイマーを止めて最終判定へ
            clearInterval(timerInterval);
            score++;
            finishQuestion('correct');
        } else {
            // 不正解：リセットして再挑戦を促す
            isLocked = true;
            changePortrait('lose');
            portraitZone.classList.add('frame-wrong', 'angry-shake');
            
            // 0.8秒後に元に戻して再入力可能にする
            setTimeout(() => {
                if (timeLeft > 0) { // まだ時間があれば
                    changePortrait('default');
                    portraitZone.classList.remove('frame-wrong', 'angry-shake');
                    document.getElementById('user-answer').value = '';
                    document.getElementById('user-answer').focus();
                    isLocked = false;
                }
            }, 800);
        }
    }

    // 最終的な解説フェーズへの移行
    function finishQuestion(result) {
        isLocked = true;
        const data = currentEraData.questions[currentIdx];
        const portraitZone = document.getElementById('portrait-zone');
        const dialogue = document.getElementById('dialogue');
        
        let statusText = "";
        if (result === 'correct') {
            statusText = "<span style='color:var(--correct)'>【 正解 】</span>";
            changePortrait('win');
            portraitZone.classList.add('frame-correct');
        } else {
            statusText = "<span style='color:var(--wrong)'>【 時間切れ 】</span>";
            changePortrait('lose');
            portraitZone.classList.add('frame-wrong');
        }

        dialogue.innerHTML = `
            ${statusText}<br><strong>${data.name}：</strong> ${data.msg}
            <div class="info-box"><strong>解説：</strong> ${data.info}</div>
        `;

        document.getElementById('user-answer').disabled = true;
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('input-area').style.display = 'none';
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < currentEraData.questions.length) {
            loadQuestion();
        } else {
            finishGame();
        }
    }

    function finishGame() {
        showScreen('result-screen');
        document.getElementById('final-score').innerText = `正解数: ${score} / ${currentEraData.questions.length}`;
    }

    document.getElementById('user-answer').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkAttempt();
    });

</script>
</body>
</html>
